name: Auto-Fix PR

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  load-labels:
    runs-on: ubuntu-latest
    outputs:
      changes_requested: ${{ steps.cfg.outputs.changes_requested }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - id: cfg
        run: |
          LABEL=$(node --input-type=module <<'EOF'
          import { readFileSync } from 'fs';
          import { parseNestedYaml } from './scripts/lib/yaml.mjs';
          process.stdout.write(parseNestedYaml(readFileSync('config/labels.yaml', 'utf8')).review.changes.name);
          EOF
          )
          echo "changes_requested=$LABEL" >> "$GITHUB_OUTPUT"

  auto-fix:
    needs: load-labels
    if: ${{ github.event.action == 'labeled' && github.event.label.name == needs.load-labels.outputs.changes_requested }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.AI_PR_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply AI fixes
        id: fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GROQ_API_URL: ${{ vars.GROQ_API_URL }}
        run: node scripts/auto_fix_pr.mjs

      - name: Commit and push fixes
        if: steps.fix.outputs.fixed_paths != ''
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          ATTEMPT: ${{ steps.fix.outputs.attempt_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix(ai): auto-fix attempt ${ATTEMPT}"
          git push origin HEAD:"${PR_BRANCH}"
