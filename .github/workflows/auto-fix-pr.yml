name: Auto-Fix PR

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-fix:
    if: ${{ github.event.action == 'labeled' && github.event.label.name == 'changes-requested' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.AI_PR_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply AI fixes
        id: fix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GROQ_API_URL: ${{ vars.GROQ_API_URL }}
        run: node scripts/auto_fix_pr.mjs

      - name: Commit and push fixes
        if: steps.fix.outputs.fixed_paths != ''
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          ATTEMPT: ${{ steps.fix.outputs.attempt_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix(ai): auto-fix attempt ${ATTEMPT}"
          git push origin HEAD:"${PR_BRANCH}"
