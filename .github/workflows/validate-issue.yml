name: Issue Validation Agent

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate issue with Groq
        id: validate
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GROQ_API_URL: ${{ vars.GROQ_API_URL }}
        run: node scripts/validate_issue.mjs

      - name: Upsert validation comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          COMMENT_BODY: ${{ steps.validate.outputs.comment }}
        run: node scripts/upsert_issue_validation_comment.mjs

      - name: Manage labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          IS_VALID: ${{ steps.validate.outputs.valid }}
        run: node scripts/manage_labels.mjs

      - name: Trigger AI Issue to PR
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run ai-issue-to-pr.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.event.repository.default_branch }}" \
            -f issue_number=${{ github.event.issue.number }}
